<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roza</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ══════════════════════════════
       DIV 1 — HERO
    ══════════════════════════════ */
    .hero {
      width: 100%;
      height: 80vh;
      background-color: #800505;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }
    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .hero-avatar {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .hero-name {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
      letter-spacing: 0.5px;
    }
    .hero-tagline {
      font-size: 1.5rem;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
      text-shadow: 0 1px 6px rgba(0,0,0,0.3);
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      text-align: center;
      max-width: 700px;
      padding: 0 1rem;
    }
    .scroll-down {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      animation: bounce 2s infinite;
    }
    .scroll-down svg { display: block; }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ══════════════════════════════
       DIV 3 — LIENS HORIZONTAUX
    ══════════════════════════════ */
    .links-section {
      width: 100%;
      padding: 5rem 2rem;
      padding-bottom: 20px;
      height: 70vh;
      background-color: #800504;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .links-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }
    .links-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f3f3f3;
      text-align: center;
    }
    .section-title {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-top: 4px;
    }
    .links-row {
      padding-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 1.4rem 2rem;
      border-radius: 18px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: #fffafa;
      text-decoration: none;
      min-width: 130px;
      transition: background 0.18s, transform 0.15s;
      backdrop-filter: blur(8px);
    }
    .link-card:hover {
      background: rgba(0,0,0,0.3);
      transform: translateY(-4px);
    }
    .link-icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tiktok-bg { background: #010101; }
    .wattpad-bg { background: #f68c1e; }
    .link-card-label { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }

    /* ══════════════════════════════
       DIV 4 — FOOTER
    ══════════════════════════════ */
    .footer {
      width: 100%;
      height: 30vh;
      padding: 3rem 2rem;
      background-color: #670202;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .footer-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .footer-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
    }
    .footer-tagline {
      font-size: 13px;
      color: rgba(255, 246, 246, 0.68);
    }
    .footer-divider {
      width: 40px;
      height: 2px;
      border-radius: 2px;
      background: rgba(255,255,255,0.4);
    }
    .footer-copy {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
